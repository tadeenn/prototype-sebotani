<!DOCTYPE html><html lang="id" style=""><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>Login - SEBOTANI</title>
<!-- Tailwind CSS CDN with forms and container-queries plugins -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Google Fonts: Inter -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
<script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'sebotani-green': '#10B981',
            'sebotani-dark-green': '#059669',
            'sebotani-gray': '#F9FAFB',
          },
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          },
        }
      }
    }
  </script>
<style data-purpose="custom-layout">
    body {
      background-color: #F3F4F6; /* Light gray background */
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    /* Hide scrollbar for cleaner mobile look */
    ::-webkit-scrollbar {
      display: none;
    }
    /* Ensure footer stays at the bottom of the screen */
    main {
      flex: 1;
    }
  </style>
</head>
<body class="font-sans antialiased">
<!-- BEGIN: MainContent -->
<main class="flex flex-col items-center justify-center px-6 pt-12 pb-24">
<!-- BEGIN: Branding -->
<header class="flex flex-col items-center mb-8" data-purpose="header-section">
<div class="flex items-center justify-center mb-4">
  <img src="https://prototype-sebotani.vercel.app/sebotani-logo.png" alt="SEBOTANI Logo" class="w-24 h-24 object-contain" style="filter: drop-shadow(rgba(0, 0, 0, 0.1) 0px 1px 1px) drop-shadow(rgba(0, 0, 0, 0.05) 0px 2px 4px);">
</div>
<h1 class="text-2xl font-bold text-gray-900 mb-2">Masuk ke Akun Anda</h1>
<p class="text-gray-500 text-sm">Masuk untuk menggunakan layanan SEBOTANI.</p>
</header>
<!-- END: Branding -->
<!-- BEGIN: LoginCard -->
<section class="w-full max-w-md bg-white rounded-3xl p-8 shadow-xl shadow-gray-200/50 border border-gray-100" data-purpose="login-form-container">
<form action="#" class="space-y-5" method="POST">
<!-- Email Field -->
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<svg class="h-5 w-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</div>
<input class="block w-full pl-11 pr-4 py-4 bg-gray-50 border-transparent focus:border-sebotani-green focus:bg-white focus:ring-0 rounded-2xl text-gray-900 placeholder-gray-400 transition-all duration-200" placeholder="Masukan email anda" required="" type="email">
</div>
<!-- Password Field -->
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<svg class="h-5 w-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</div>
<input class="block w-full pl-11 pr-12 py-4 bg-gray-50 border-transparent focus:border-sebotani-green focus:bg-white focus:ring-0 rounded-2xl text-gray-900 placeholder-gray-400 transition-all duration-200" placeholder="••••••••" required="" type="password">
<button class="absolute inset-y-0 right-0 pr-4 flex items-center text-gray-400 hover:text-gray-600" type="button">
<svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
<path d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</button>
</div>
<!-- Options: Remember Me & Forgot Password -->
<div class="flex items-center justify-between text-sm">
<label class="flex items-center space-x-2 cursor-pointer group">
<input class="h-4 w-4 rounded border-gray-300 text-sebotani-green focus:ring-sebotani-green transition-all" type="checkbox">
<span class="text-gray-600 group-hover:text-gray-900">Ingat saya</span>
</label>
<a class="text-sebotani-green font-semibold hover:text-sebotani-dark-green transition-colors" href="#">Lupa password?</a>
</div>
<!-- Submit Button -->
<!-- Submit Button -->
<button onclick="window.location.href='dashboard_petani.html'" class="w-full bg-sebotani-green hover:bg-sebotani-dark-green text-white font-bold py-4 rounded-2xl active:scale-[0.98] transition-all duration-150" type="button">
    Masuk Aplikasi
</button>
<!-- Divider -->
<div class="relative py-2">
<div class="absolute inset-0 flex items-center"><div class="w-full border-t border-gray-100"></div></div>
<div class="relative flex justify-center text-xs uppercase">
<span class="bg-white px-3 text-gray-400 font-medium">Atau</span>
</div>
</div>
<!-- Social Login -->
<button class="w-full flex items-center justify-center gap-3 bg-white border border-gray-200 hover:bg-gray-50 text-gray-700 font-semibold py-4 rounded-2xl transition-all duration-200 active:scale-[0.98]" type="button">
<img alt="Google" class="w-5 h-5" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCdASmRzyGrNple1axNed5LB5btEPrVbGRhsZisDg0LGLPGYCmtM5Dn8o1tDDb-rpIBqtCMDKPzKkksN85z6ZXejbX0WpOQy7nZuFhIMRR_K0c6kVsPafwv4BG0yyJ-FrL7L2WTGF0ZTrgbnfefi4gxjI8sLm082pl7dwap58Uzsa-_8F0CADWnhNQTUffHiaTomtLU22t8J4Q66Zr47__v4KcoCNK44D_85grAoYKwK-qSuDhTZ1x0ycZ_ba3gksgcknCzCPDfxkqsOw">
          Masuk Dengan Google
        </button>
</form>
</section>
<!-- END: LoginCard -->
<!-- Registration Footer -->
<div class="mt-10 text-center">
<p class="text-gray-600 text-sm">
        Belum punya akun? <a class="text-sebotani-green font-bold hover:underline" href="#">Daftar di sini</a>
</p>
</div>
</main>
<!-- END: MainContent -->
<!-- BEGIN: NavigationBar -->

<!-- END: NavigationBar -->










</body></html>
